name: PR Review Bot
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go run .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}